<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WDAI — Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css?v=5">
<style>
  html, body { margin:0; padding:0; background:#1b0f3d; font-family:'Figtree', system-ui, sans-serif; color:#fff4e4; }
  .card { padding: 20px 28px; display:grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items:center; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .lbl { font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:rgba(255,244,228,0.55); }
  .input {
    background: rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.14);
    border-radius: 12px; padding: 11px 14px;
    color:#fff4e4; font-family:'Figtree', system-ui, sans-serif; font-size:14px;
    outline: none;
  }
  .input.focus { border-color:#e93583; box-shadow: 0 0 0 3px rgba(233,30,99,0.20); }
  .check { display:flex; align-items:center; gap:10px; font-size:14px; color:#fff4e4; }
  .checkbox { width:18px; height:18px; border-radius:5px; background:#e93583; display:flex; align-items:center; justify-content:center; color:#fff4e4; font-size:13px; }
  .radio { width:18px; height:18px; border-radius:50%; border:1.5px solid rgba(255,255,255,0.35); display:flex; align-items:center; justify-content:center; }
  .radio.on { border-color:#e93583; }
  .radio.on::after { content:""; width:8px; height:8px; border-radius:50%; background:#e93583; }
</style>
</head>
<body>
<div class="card">
  <div class="field"><div class="lbl">Your name</div><input class="input" value="Helen Lee Kupp"></div>
  <div class="field"><div class="lbl">Email</div><input class="input focus" value="helen@wdai.org"></div>
  <div class="check"><div class="checkbox">✓</div> Send me lesson recaps</div>
  <div class="check"><div class="radio on"></div> Charter cohort</div>
</div>
</body>
</html>
