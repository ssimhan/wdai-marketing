<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css?v=5">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:'Figtree',system-ui,sans-serif;}
  .card{padding:20px;}
  .lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#4a3a70;margin-bottom:12px;}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
  .sw{border-radius:10px;padding:14px 12px;aspect-ratio:1/1;display:flex;flex-direction:column;justify-content:flex-end;}
  .sw .n{font-size:10px;font-weight:600;letter-spacing:0.03em;text-transform:uppercase;line-height:1.2;}
  .sw .h{font-family:'JetBrains Mono',monospace;font-size:10px;opacity:0.85;margin-top:2px;}
  .dark .n,.dark .h{color:#fff4e4;} .light .n,.light .h{color:#1b0f3d;}
</style>
</head>
<body>
<div class="card">
  <div class="lbl">Secondary / warm palette — tags, data viz, illustrations</div>
  <div class="row">
    <div class="sw light" style="background:#ecc364;"><div class="n">Gold</div><div class="h">#ecc364</div></div>
    <div class="sw light" style="background:#e8754f;"><div class="n">Coral</div><div class="h">#e8754f</div></div>
    <div class="sw dark"  style="background:#b93d73;"><div class="n">Raspberry</div><div class="h">#b93d73</div></div>
    <div class="sw light" style="background:#a684b8;"><div class="n">D. Lavender</div><div class="h">#a684b8</div></div>
    <div class="sw dark"  style="background:#6e4a82;"><div class="n">Mauve</div><div class="h">#6e4a82</div></div>
    <div class="sw dark"  style="background:#332961;"><div class="n">Deep Indigo</div><div class="h">#332961</div></div>
  </div>
</div>
</body>
</html>
