<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WDAI — Shadows & glows</title>
<link rel="stylesheet" href="../colors_and_type.css?v=5">
<style>
  html, body { margin:0; padding:0; background:#1b0f3d; font-family:'Figtree', system-ui, sans-serif; color:#fff4e4; }
  .card { padding: 28px; display:grid; grid-template-columns: repeat(5, 1fr); gap: 16px; align-items:end; }
  .box {
    background: #2a1a52;
    border-radius: 12px; height: 88px;
    display:flex; align-items:flex-end; padding: 10px 12px;
    font-family:'JetBrains Mono', monospace; font-size:10px; color:rgba(255,244,228,0.7);
  }
  .s1 { box-shadow: 0 1px 2px rgba(0,0,0,0.20); }
  .s2 { box-shadow: 0 6px 18px rgba(0,0,0,0.28); }
  .s3 { box-shadow: 0 18px 48px rgba(0,0,0,0.40); }
  .gp { box-shadow: 0 0 32px rgba(233, 30, 99, 0.45); background: linear-gradient(135deg,#3a2470,#2a1a52); }
  .gc { box-shadow: 0 0 32px rgba(249, 115, 22, 0.40); background: linear-gradient(135deg,#3a2470,#2a1a52); }
</style>
</head>
<body>
<div class="card">
  <div class="box s1">shadow-1</div>
  <div class="box s2">shadow-2</div>
  <div class="box s3">shadow-3</div>
  <div class="box gp">glow-pink</div>
  <div class="box gc">glow-coral</div>
</div>
</body>
</html>
