<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WDAI — Dot texture</title>
<link rel="stylesheet" href="../colors_and_type.css?v=5">
<style>
  html, body { margin:0; padding:0; background:#fff; font-family:'Figtree', system-ui, sans-serif; }
  .card { padding:20px; }
  .tex {
    height: 180px; border-radius: 16px; position:relative; overflow:hidden;
    background: linear-gradient(135deg, #1b0f3d 0%, #2a1a52 100%);
  }
  .tex::after {
    content:""; position:absolute; inset:0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1.2px);
    background-size: 28px 28px;
  }
  .lbl { position:absolute; left:24px; bottom:20px; color:#fff4e4; font-family:'Instrument Serif', Georgia, serif; font-weight:400; font-size:22px; letter-spacing:-0.02em; z-index:1; }
  .mono { position:absolute; right:24px; bottom:20px; font-family:'JetBrains Mono', monospace; font-size:11px; color:rgba(255,244,228,0.55); z-index:1; }
</style>
</head>
<body>
<div class="card">
  <div class="tex">
    <div class="lbl">Dot texture overlay</div>
    <div class="mono">white 6% · 28px grid</div>
  </div>
</div>
</body>
</html>
