<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WDAI — Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css?v=5">
<style>
  html, body { margin:0; padding:0; background:#1b0f3d; font-family:'Figtree', system-ui, sans-serif; color:#fff4e4; }
  .card { padding: 24px 28px; }
  .row { display:flex; align-items:center; gap:14px; padding:5px 0; }
  .tag { font-family:'JetBrains Mono', monospace; font-size:11px; color:rgba(255,244,228,0.5); width:60px; }
  .bar { background: linear-gradient(90deg,#e93583,#ee8933); height: 14px; border-radius: 3px; }
  .px { font-family:'JetBrains Mono', monospace; font-size:11px; color:rgba(255,244,228,0.75); }
</style>
</head>
<body>
<div class="card">
  <div class="row"><div class="tag">space-1</div><div class="bar" style="width:4px;"></div><div class="px">4px</div></div>
  <div class="row"><div class="tag">space-2</div><div class="bar" style="width:8px;"></div><div class="px">8px</div></div>
  <div class="row"><div class="tag">space-3</div><div class="bar" style="width:12px;"></div><div class="px">12px</div></div>
  <div class="row"><div class="tag">space-4</div><div class="bar" style="width:16px;"></div><div class="px">16px</div></div>
  <div class="row"><div class="tag">space-5</div><div class="bar" style="width:24px;"></div><div class="px">24px</div></div>
  <div class="row"><div class="tag">space-6</div><div class="bar" style="width:32px;"></div><div class="px">32px</div></div>
  <div class="row"><div class="tag">space-7</div><div class="bar" style="width:48px;"></div><div class="px">48px</div></div>
  <div class="row"><div class="tag">space-8</div><div class="bar" style="width:64px;"></div><div class="px">64px</div></div>
</div>
</body>
</html>
