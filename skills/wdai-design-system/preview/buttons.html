<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WDAI — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css?v=5">
<style>
  html, body { margin:0; padding:0; background:#1b0f3d; font-family:'Figtree', system-ui, sans-serif; color:#fff4e4; }
  .card { padding: 24px 28px; display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
  .btn {
    font-family:'Figtree', system-ui, sans-serif; font-weight:600; font-size:15px;
    padding: 12px 22px; border-radius: 12px; border:none; cursor:pointer;
    display:inline-flex; align-items:center; gap:8px;
    transition: transform 220ms cubic-bezier(0.22,1,0.36,1), filter 220ms;
  }
  .btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
  .btn.primary { background: linear-gradient(90deg,#e93583,#ee8933); color:#fff4e4; box-shadow: 0 0 24px rgba(233,30,99,0.35); }
  .btn.ghost   { background: transparent; color:#fff4e4; border:1px solid rgba(255,255,255,0.22); }
  .btn.solid   { background:#e93583; color:#fff4e4; }
  .btn.warm    { background:#fbd03b; color:#1b0f3d; }
  .arrow { font-family:'JetBrains Mono', monospace; font-weight:500; }
</style>
</head>
<body>
<div class="card">
  <button class="btn primary">Start lesson <span class="arrow">→</span></button>
  <button class="btn solid">Apply</button>
  <button class="btn ghost">Learn more</button>
  <button class="btn warm">Save</button>
</div>
</body>
</html>
