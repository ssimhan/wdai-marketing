<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css?v=5">
<style>
  html,body{margin:0;padding:0;background:#1b0f3d;color:#fff4e4;font-family:'Figtree',system-ui,sans-serif;}
  .card{padding:16px 20px 22px;}
  .lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,244,228,0.55);margin-bottom:12px;}
  .stage{position:relative;height:220px;border-radius:12px;overflow:hidden;background:linear-gradient(135deg,#e93583 0%,#ee8933 100%);}
  .ribbon{position:absolute;left:0;bottom:24px;display:flex;align-items:stretch;background:#332961;color:#fff4e4;max-width:84%;clip-path:polygon(0 0,calc(100% - 22px) 0,100% 50%,calc(100% - 22px) 100%,0 100%);padding:14px 34px 14px 20px;}
  .ribbon .title{font-family:'Figtree',system-ui,sans-serif;font-weight:800;font-size:15px;letter-spacing:0.06em;text-transform:uppercase;line-height:1;padding-right:18px;border-right:1px solid rgba(255,244,228,0.2);display:flex;align-items:center;white-space:nowrap;}
  .ribbon .body{font-size:11px;line-height:1.5;color:rgba(255,244,228,0.78);padding-left:16px;max-width:300px;}
</style>
</head>
<body>
<div class="card">
  <div class="lbl">Callout ribbon — annotation over imagery</div>
  <div class="stage">
    <div class="ribbon">
      <div class="title">Pattern<br/>Design</div>
      <div class="body">The chevron weave symbolizes women weaving the future of technology — a motif of many threads, one cloth.</div>
    </div>
  </div>
</div>
</body>
</html>
