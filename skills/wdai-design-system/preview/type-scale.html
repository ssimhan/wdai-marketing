<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WDAI — Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css?v=5">
<style>
  html, body { margin:0; padding:0; background:#1b0f3d; font-family:'Figtree', system-ui, sans-serif; color:#fff4e4; }
  .card { padding: 20px 28px; }
  .row { display:grid; grid-template-columns: 80px 1fr 80px; align-items:baseline; gap:16px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .row:last-child { border-bottom:none; }
  .tag { font-family:'JetBrains Mono', monospace; font-size:10px; color:rgba(255,244,228,0.55); text-transform:uppercase; letter-spacing:0.06em; }
  .px { font-family:'JetBrains Mono', monospace; font-size:10px; color:rgba(255,244,228,0.4); text-align:right; }
  .spec { font-family:'Instrument Serif', Georgia, serif; font-weight:400; letter-spacing:-0.008em; color:#fff4e4; line-height:1; }
  .body { font-family:'Figtree', system-ui, sans-serif; font-weight:500; color:#fff4e4; line-height:1.3; }
</style>
</head>
<body>
<div class="card">
  <div class="row"><div class="tag">D1</div><div class="spec" style="font-size:56px;">Defining</div><div class="px">112</div></div>
  <div class="row"><div class="tag">D2</div><div class="spec" style="font-size:38px;">Headline</div><div class="px">88</div></div>
  <div class="row"><div class="tag">H1</div><div class="spec" style="font-size:26px;">Section title</div><div class="px">48</div></div>
  <div class="row"><div class="tag">Body</div><div class="body" style="font-size:16px;">Body copy sits at 20px on slides, 16–18px on web.</div><div class="px">20</div></div>
</div>
</body>
</html>
