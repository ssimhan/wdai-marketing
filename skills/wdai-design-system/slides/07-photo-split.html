<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo split — WDAI</title>
<link rel="stylesheet" href="../colors_and_type.css?v=5">
<link rel="stylesheet" href="slide.css">
</head>
<body class="wdai">
<div class="stage">
  <div class="slide bg-flat">
    <div style="position:absolute; inset:0; display:grid; grid-template-columns: 1fr 1fr;">
      <div style="position:relative; overflow:hidden; background:
          radial-gradient(ellipse 80% 80% at 30% 40%, #fbd03b 0 12%, transparent 13%),
          radial-gradient(circle at 60% 55%, #fff4e4 0 14%, transparent 15%),
          radial-gradient(ellipse 60% 50% at 50% 80%, #e93583 0 45%, transparent 46%),
          linear-gradient(160deg, #8b2fa6 0%, #2a1a52 60%, #1b0f3d 100%);">
        <div style="position:absolute; left:48px; bottom:40px; font-family:var(--font-mono); font-size:14px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,244,228,0.55);">illustration · placeholder</div>
      </div>
      <div style="padding: 112px 96px 96px 96px; display:flex; flex-direction:column; justify-content:center;" class="dots">
        <div class="eyebrow">Charter cohort</div>
        <h1 style="font-family:var(--font-display); font-weight:400; letter-spacing:-0.025em; font-size:76px; line-height:1.08; margin:0 0 36px 0; color:#fff4e4;">
          Leaders who <span class="grad-text">build</span> the curriculum they wished they'd had.
        </h1>
        <p style="font-family:var(--font-body); font-weight:400; font-size:28px; line-height:1.45; color:rgba(255,244,228,0.75); margin:0; max-width:640px;">
          Eight weeks. A small cohort of women shipping real AI work in public, on a schedule that respects the rest of your life.
        </p>
        <div style="margin-top:56px; display:flex; gap:16px;">
          <div style="background: linear-gradient(90deg,#e93583,#ee8933); color:#fff4e4; padding:18px 32px; border-radius:12px; font-family:var(--font-body); font-weight:600; font-size:20px; box-shadow: 0 0 32px rgba(233,30,99,0.35);">Apply for Fall 2026 →</div>
          <div style="background:transparent; border:1px solid rgba(255,255,255,0.25); color:#fff4e4; padding:18px 32px; border-radius:12px; font-family:var(--font-body); font-weight:500; font-size:20px;">See the syllabus</div>
        </div>
      </div>
    </div>
    <div class="slide-num" style="color: rgba(255,244,228,0.6);">18 / 24</div>
    <div class="slide-mark"><img src="../assets/wdai-logo.png"><div class="wm">WDAI</div></div>
  </div>
</div>
</body>
</html>
