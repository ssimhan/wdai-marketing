<style>
  html, body { margin:0; padding:0; background:#0a0520; color:#fff4e4; font-family:'Figtree', system-ui, sans-serif; }
  .wrap { max-width: 1440px; margin: 0 auto; padding: 64px 48px; }
  h1 { font-family:'Instrument Serif', Georgia, serif; font-weight:400; letter-spacing:-0.01em; font-size:64px; line-height:1; margin:0 0 8px 0; }

  .frame { aspect-ratio: 16/9; overflow:hidden; position:relative; background:#1b0f3d; }

  .name { font-family:'Instrument Serif', Georgia, serif; font-weight:600; font-size:18px; }
